name: spm-binary-sync

on:
  schedule:
    - cron: '13 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spm-binary-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  DEVELOPER_DIR: /Applications/Xcode_16.4.0.app/Contents/Developer

jobs:
  resolve:
    if: github.ref_name == 'spm-binary'
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      package_tag: ${{ steps.resolve.outputs.package_tag }}
      should_release: ${{ steps.release_status.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch-upstream-tags
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Tencent/ncnn.git
          git fetch upstream 'refs/tags/*:refs/upstream-tags/*'

      - name: resolve-upstream-tag
        id: resolve
        run: |
          python3 scripts/spm/select_upstream_tag.py --repo-root "$GITHUB_WORKSPACE" --github-output "$GITHUB_OUTPUT"

      - name: check-existing-release
        id: release_status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.resolve.outputs.package_tag }}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    strategy:
      matrix:
        variant:
          - ncnn
          - ncnn_vulkan
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch-upstream-tags
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Tencent/ncnn.git
          git fetch upstream 'refs/tags/*:refs/upstream-tags/*'

      - name: prepare-upstream-source
        run: |
          git worktree add "$RUNNER_TEMP/upstream-source" "refs/upstream-tags/${{ needs.resolve.outputs.upstream_tag }}"
          git -C "$RUNNER_TEMP/upstream-source" submodule update --init --recursive

      - name: build-xcframework
        run: |
          python3 scripts/spm/build_apple_xcframework.py \
            --variant "${{ matrix.variant }}" \
            --upstream-tag "${{ needs.resolve.outputs.upstream_tag }}" \
            --source-root "$RUNNER_TEMP/upstream-source" \
            --output-dir "$RUNNER_TEMP/spm-artifacts"

      - name: upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spm-${{ matrix.variant }}
          path: ${{ runner.temp }}/spm-artifacts/${{ matrix.variant }}

  release:
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: download-cpu-artifacts
        uses: actions/download-artifact@v8
        with:
          name: spm-ncnn
          path: artifacts/ncnn

      - name: download-vulkan-artifacts
        uses: actions/download-artifact@v8
        with:
          name: spm-ncnn_vulkan
          path: artifacts/ncnn_vulkan

      - name: render-package
        run: |
          python3 scripts/spm/render_package.py \
            --release-metadata artifacts/ncnn/ncnn.release.json \
            --release-metadata artifacts/ncnn_vulkan/ncnn_vulkan.release.json \
            --current-release-json scripts/spm/current_release.json

      - name: validate-package-manifest
        run: |
          swift package dump-package >/tmp/ncnn-package.json

      - name: commit-release-metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/spm/current_release.json
          if ! git diff --cached --quiet; then
            git commit -m "Update SwiftPM binary metadata for ${{ needs.resolve.outputs.package_tag }}"
          fi
          git push origin HEAD:spm-binary
          if git ls-remote --exit-code --tags origin "refs/tags/${{ needs.resolve.outputs.package_tag }}" >/dev/null 2>&1; then
            echo "package tag already exists: ${{ needs.resolve.outputs.package_tag }}" >&2
            exit 1
          fi
          git tag "${{ needs.resolve.outputs.package_tag }}"
          git push origin "refs/tags/${{ needs.resolve.outputs.package_tag }}"

      - name: create-release-notes
        run: |
          cat > /tmp/spm-release-notes.md <<'EOF'
          Apple SwiftPM binary distribution for ncnn.

          - Migration model: dedicated packaging branch on SPMForge/ncnn
          - Upstream source tag: ${{ needs.resolve.outputs.upstream_tag }}
          - Package tag: ${{ needs.resolve.outputs.package_tag }}
          - Products: NCNN, NCNNVulkan
          - Vulkan caveat: watchOS and watchOS Simulator are intentionally excluded
          - Verification: script unit tests, local xcframework smoke tests, swift package dump-package
          EOF

      - name: publish-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.resolve.outputs.package_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "ncnn SwiftPM binary ${{ needs.resolve.outputs.package_tag }}" \
            --notes-file /tmp/spm-release-notes.md \
            artifacts/ncnn/*.zip \
            artifacts/ncnn_vulkan/*.zip
