name: _publish-upstream-release-core

on:
  workflow_call:
    inputs:
      upstream_tag:
        required: false
        type: string
      release_channel:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: _publish-upstream-release-core-${{ github.workflow }}-${{ inputs.release_channel }}-${{ inputs.upstream_tag || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify packaging gates
    if: github.ref_name == 'main' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: run-packaging-unit-tests
        run: |
          python3 -m unittest \
            scripts.spm.tests.test_release_flow \
            scripts.spm.tests.test_source_acquisition \
            scripts.spm.tests.test_spm_packaging \
            scripts.spm.tests.test_xcframework_validation \
            scripts.tests.test_release_branch_workflows

  resolve:
    name: Resolve package release
    if: github.ref_name == 'main' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      package_tag: ${{ steps.resolve.outputs.package_tag }}
      remote_tag_exists: ${{ steps.resolve.outputs.remote_tag_exists }}
      remote_tag_commit: ${{ steps.resolve.outputs.remote_tag_commit }}
      release_mode: ${{ steps.release_status.outputs.mode }}
      release_exists: ${{ steps.release_status.outputs.release_exists }}
      metadata_needs_repair: ${{ steps.release_status.outputs.metadata_needs_repair }}
      missing_assets: ${{ steps.release_status.outputs.missing_assets }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch-package-tags
        run: |
          git fetch origin 'refs/tags/*:refs/tags/*'

      - name: fetch-upstream-tags
        run: |
          python3 scripts/spm/source_acquisition.py fetch-tags --repo-root "$GITHUB_WORKSPACE"

      - name: resolve-upstream-tag
        id: resolve
        run: |
          select_args=(--repo-root "$GITHUB_WORKSPACE" --release-channel "${{ inputs.release_channel }}" --github-output "$GITHUB_OUTPUT")
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            select_args+=(--explicit-tag "${{ inputs.upstream_tag }}")
          fi
          python3 scripts/spm/select_upstream_tag.py "${select_args[@]}"

      - name: check-existing-release
        id: release_status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_release_tag=""
          release_view_json="$RUNNER_TEMP/release-view.json"
          inspect_args=(
            inspect-release
            --package-tag "${{ steps.resolve.outputs.package_tag }}"
            --upstream-tag "${{ steps.resolve.outputs.upstream_tag }}"
            --release-channel "${{ inputs.release_channel }}"
            --github-output "$GITHUB_OUTPUT"
          )

          if [[ "${{ steps.resolve.outputs.remote_tag_exists }}" == "true" ]]; then
            inspect_args+=(--tag-exists)
          fi

          if gh release view "${{ steps.resolve.outputs.package_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --json isPrerelease,assets >"$release_view_json" 2>/dev/null; then
            inspect_args+=(--release-view-json "$release_view_json")
          fi

          if latest_release_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null)"; then
            inspect_args+=(--latest-release-tag "$latest_release_tag")
          fi

          python3 scripts/spm/release_state.py "${inspect_args[@]}"

  build:
    name: Build Apple artifacts (${{ matrix.variant }})
    needs:
      - verify
      - resolve
    if: needs.resolve.outputs.release_mode != 'skip'
    strategy:
      matrix:
        include:
          - variant: ncnn
            required_platforms: ios ios-simulator macos ios-maccatalyst tvos tvos-simulator watchos watchos-simulator xros xros-simulator
          - variant: ncnn_vulkan
            required_platforms: ios ios-simulator macos ios-maccatalyst tvos tvos-simulator xros xros-simulator
    runs-on: macos-15
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPILERCHECK: content
      CCACHE_NOHASHDIR: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: resolve-xcode-version
        id: xcode
        run: |
          xcode_version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/ $//')"
          xcode_version_key="$(printf '%s' "$xcode_version" | tr ' ' '-' | tr -cd '[:alnum:]-._')"
          echo "version=$xcode_version" >> "$GITHUB_OUTPUT"
          echo "version_key=$xcode_version_key" >> "$GITHUB_OUTPUT"

      - name: preflight-apple-platforms
        run: |
          preflight_args=()
          for platform in ${{ matrix.required_platforms }}; do
            preflight_args+=(--required-platform "$platform")
          done
          python3 scripts/spm/preflight_apple_platforms.py \
            --variant "${{ matrix.variant }}" \
            "${preflight_args[@]}"

      - name: restore-ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-v3-${{ steps.xcode.outputs.version_key }}-${{ matrix.variant }}-${{ needs.resolve.outputs.upstream_tag }}-${{ hashFiles('scripts/spm/archive_builder.py', 'scripts/spm/build_apple_xcframework.py', 'scripts/spm/packaging.py', 'scripts/spm/platforms.json', 'toolchains/ios.toolchain.cmake') }}
          restore-keys: |
            ${{ runner.os }}-ccache-v3-${{ steps.xcode.outputs.version_key }}-${{ matrix.variant }}-${{ needs.resolve.outputs.upstream_tag }}-
            ${{ runner.os }}-ccache-v3-${{ steps.xcode.outputs.version_key }}-${{ matrix.variant }}-
            ${{ runner.os }}-ccache-v3-${{ steps.xcode.outputs.version_key }}-

      - name: install-ccache
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ccache --version

      - name: reset-ccache-stats
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --zero-stats

      - name: fetch-upstream-tags
        run: |
          python3 scripts/spm/source_acquisition.py fetch-tags --repo-root "$GITHUB_WORKSPACE"

      - name: prepare-upstream-source
        run: |
          python3 scripts/spm/source_acquisition.py export-source \
            --repo-root "$GITHUB_WORKSPACE" \
            --upstream-tag "${{ needs.resolve.outputs.upstream_tag }}" \
            --destination "$RUNNER_TEMP/upstream-source"

      - name: build-xcframework
        run: |
          python3 scripts/spm/build_apple_xcframework.py \
            --variant "${{ matrix.variant }}" \
            --upstream-tag "${{ needs.resolve.outputs.upstream_tag }}" \
            --package-tag "${{ needs.resolve.outputs.package_tag }}" \
            --source-root "$RUNNER_TEMP/upstream-source" \
            --output-dir "$RUNNER_TEMP/spm-artifacts"

      - name: validate-xcframework
        run: |
          validation_args=()
          for platform in ${{ matrix.required_platforms }}; do
            validation_args+=(--require-platform "$platform")
          done
          archive_path="$(find "$RUNNER_TEMP/spm-artifacts/${{ matrix.variant }}" -maxdepth 1 -name '*.xcframework.zip' -print -quit)"
          if [ -z "$archive_path" ]; then
            echo "missing xcframework archive for ${{ matrix.variant }}" >&2
            exit 1
          fi
          python3 scripts/spm/validate_mergeable_xcframework.py \
            "$archive_path" \
            "${validation_args[@]}"

      - name: upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.variant }}
          path: |
            ${{ runner.temp }}/spm-artifacts/${{ matrix.variant }}/*.xcframework.zip
            ${{ runner.temp }}/spm-artifacts/${{ matrix.variant }}/${{ matrix.variant }}.release.json

      - name: build-ccache-stats
        if: always()
        run: |
          ccache --show-stats

  release:
    name: Publish selected release channel
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.release_mode != 'skip'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: download-cpu-artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_prefix }}-ncnn
          path: artifacts/ncnn

      - name: download-vulkan-artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_prefix }}-ncnn_vulkan
          path: artifacts/ncnn_vulkan

      - name: render-package
        run: |
          python3 scripts/spm/render_package.py \
            --output Package.swift \
            --release-metadata artifacts/ncnn/ncnn.release.json \
            --release-metadata artifacts/ncnn_vulkan/ncnn_vulkan.release.json \
            --current-release-json scripts/spm/current_release.json

      - name: validate-package-manifest
        run: |
          swift package dump-package >/tmp/ncnn-package.json

      - name: prepare-release-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "${{ needs.resolve.outputs.remote_tag_exists }}" == "true" ]]; then
            existing_package_file="$RUNNER_TEMP/existing-package.swift"
            if ! git show "refs/tags/${{ needs.resolve.outputs.package_tag }}:Package.swift" >"$existing_package_file" 2>/dev/null; then
              echo "package tag already exists without Package.swift: ${{ needs.resolve.outputs.package_tag }}" >&2
              exit 1
            fi
            if ! cmp -s "$existing_package_file" Package.swift; then
              echo "package tag already exists with a different Package.swift: ${{ needs.resolve.outputs.package_tag }}" >&2
              exit 1
            fi
            echo "release_commit=${{ needs.resolve.outputs.remote_tag_commit }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add Package.swift
          git add scripts/spm/current_release.json
          if ! git diff --cached --quiet; then
            git commit -m "Update SwiftPM binary metadata for ${{ needs.resolve.outputs.package_tag }}"
          fi
          git push origin HEAD:"$TARGET_BRANCH"
          git tag "${{ needs.resolve.outputs.package_tag }}"
          git push origin "refs/tags/${{ needs.resolve.outputs.package_tag }}"
          echo "release_commit=$(git rev-parse "${{ needs.resolve.outputs.package_tag }}^{commit}")" >> "$GITHUB_OUTPUT"

      - name: create-release-notes
        run: |
          channel_label="${{ inputs.release_channel }}"
          if [ "${{ inputs.release_channel }}" = "sync" ]; then
            channel_label="alpha prerelease (scheduled latest stable detection)"
          fi
          cat > /tmp/spm-release-notes.md <<EOF
          Apple SwiftPM binary release for ncnn.

          - Migration model: wrapper-style packaging branch on SPMForge/ncnn
          - Upstream source tag: ${{ needs.resolve.outputs.upstream_tag }}
          - Package tag: ${{ needs.resolve.outputs.package_tag }}
          - Release channel: ${channel_label}
          - Source acquisition: repo-local source acquisition contract with exported upstream snapshot
          - Products: NCNN, NCNNVulkan
          - Vulkan caveat: watchOS and watchOS Simulator are intentionally excluded
          - Verification: script unit tests, xcframework artifact validation, local xcframework smoke tests, swift package dump-package
          EOF

      - name: publish-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "${{ needs.resolve.outputs.package_tag }}"
            --repo "$GITHUB_REPOSITORY"
            --verify-tag
            --title "ncnn SwiftPM binary ${{ needs.resolve.outputs.package_tag }}"
            --notes-file /tmp/spm-release-notes.md
            artifacts/ncnn/*.zip
            artifacts/ncnn_vulkan/*.zip
          )

          if [ "${{ inputs.release_channel }}" = "alpha" ] || [ "${{ inputs.release_channel }}" = "sync" ]; then
            release_args+=(--prerelease --latest=false)
          fi

          if [ "${{ needs.resolve.outputs.release_mode }}" = "create" ]; then
            gh release create "${release_args[@]}"
            exit 0
          fi

          if gh release view "${{ needs.resolve.outputs.package_tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "${{ needs.resolve.outputs.package_tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              artifacts/ncnn/*.zip \
              artifacts/ncnn_vulkan/*.zip
            gh release edit "${{ needs.resolve.outputs.package_tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "ncnn SwiftPM binary ${{ needs.resolve.outputs.package_tag }}" \
              --notes-file /tmp/spm-release-notes.md
          else
            gh release create "${release_args[@]}"
          fi

      - name: normalize-release-metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_id="$(
            gh release view "${{ needs.resolve.outputs.package_tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --json databaseId \
              --jq '.databaseId'
          )"

          if [ "${{ inputs.release_channel }}" = "stable" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F prerelease=false \
              -f name="${{ needs.resolve.outputs.package_tag }}" \
              -F body=@/tmp/spm-release-notes.md >/dev/null
          else
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F prerelease=true \
              -F make_latest=false \
              -f name="${{ needs.resolve.outputs.package_tag }}" \
              -F body=@/tmp/spm-release-notes.md >/dev/null
          fi
